<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Какой тебе подходит нейрообраз?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf8ff;
      --bg-2: #fff5f8;
      --surface: rgba(255, 255, 255, 0.72);
      --surface-strong: rgba(255, 255, 255, 0.92);
      --border: rgba(200, 180, 220, 0.35);
      --text: #2a2438;
      --text-soft: #6b6280;
      --accent: #b886c9;
      --accent-2: #e8a4c4;
      --accent-deep: #8b6bb0;
      --shadow: 0 18px 48px rgba(120, 90, 160, 0.12);
      --shadow-hover: 0 22px 56px rgba(120, 90, 160, 0.18);
      --radius: 20px;
      --radius-sm: 14px;
      --transition: 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Manrope", system-ui, sans-serif;
      color: var(--text);
      min-height: 100dvh;
      background:
        radial-gradient(120% 80% at 10% 0%, rgba(232, 210, 255, 0.45) 0%, transparent 55%),
        radial-gradient(100% 70% at 100% 10%, rgba(255, 214, 230, 0.5) 0%, transparent 50%),
        radial-gradient(80% 60% at 50% 100%, rgba(220, 235, 255, 0.4) 0%, transparent 45%),
        linear-gradient(165deg, var(--bg) 0%, #ffffff 40%, var(--bg-2) 100%);
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 560px;
      margin: 0 auto;
      padding: clamp(1.25rem, 4vw, 2rem);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .panel {
      background: var(--surface-strong);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(1.5rem, 5vw, 2.25rem);
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.5) 0%, transparent 40%, rgba(255, 240, 250, 0.35) 100%);
      pointer-events: none;
      border-radius: inherit;
    }

    .panel > * {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-family: "Playfair Display", Georgia, serif;
      font-weight: 600;
      font-size: clamp(1.65rem, 5.5vw, 2.15rem);
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 0.75rem;
      background: linear-gradient(120deg, var(--text) 0%, var(--accent-deep) 55%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      color: var(--text-soft);
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 1.75rem;
    }

    .progress-wrap {
      margin-bottom: 1.5rem;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-soft);
      margin-bottom: 0.5rem;
    }

    .progress-track {
      height: 6px;
      border-radius: 999px;
      background: rgba(184, 134, 201, 0.15);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent-deep), var(--accent-2));
      transition: width var(--transition);
    }

    .question-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: var(--text);
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .answer-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 1rem 1.1rem;
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease,
        border-color 0.25s ease,
        background 0.25s ease;
    }

    .answer-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(184, 134, 201, 0.45);
      background: #fff;
    }

    .answer-btn:active {
      transform: translateY(0);
    }

    .answer-btn:focus-visible {
      outline: 2px solid var(--accent-deep);
      outline-offset: 2px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 1rem 1.5rem;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent-deep) 0%, #c77bb8 50%, var(--accent-2) 100%);
      background-size: 200% 100%;
      background-position: 0% 50%;
      box-shadow: 0 12px 32px rgba(139, 107, 176, 0.35);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background-position 0.5s ease;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(139, 107, 176, 0.42);
      background-position: 100% 50%;
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.9rem 1.25rem;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--accent-deep);
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      margin-top: 0.65rem;
      transition: background 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
    }

    .btn-secondary:hover {
      background: #fff;
      border-color: rgba(184, 134, 201, 0.5);
      transform: translateY(-1px);
    }

    .screens {
      position: relative;
      min-height: 320px;
    }

    .screen {
      opacity: 0;
      visibility: hidden;
      position: absolute;
      inset: 0;
      transform: translateX(12px);
      transition:
        opacity var(--transition),
        transform var(--transition),
        visibility 0s linear 0.45s;
    }

    .screen.is-active {
      opacity: 1;
      visibility: visible;
      transform: translateX(0);
      position: relative;
      transition:
        opacity var(--transition),
        transform var(--transition),
        visibility 0s linear 0s;
    }

    .screen.is-exit {
      opacity: 0;
      transform: translateX(-12px);
      position: absolute;
      pointer-events: none;
    }

    .quiz-body {
      transition: opacity 0.38s ease, transform 0.38s ease;
    }

    .quiz-body.is-fading {
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
    }

    .result-name {
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(1.35rem, 4vw, 1.65rem);
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: var(--text);
    }

    .result-desc {
      color: var(--text-soft);
      font-size: 0.95rem;
      margin-bottom: 1.25rem;
    }

    .prompt-box {
      background: linear-gradient(145deg, rgba(250, 246, 255, 0.95) 0%, rgba(255, 248, 252, 0.98) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem 1.1rem;
      font-size: 0.82rem;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 1rem;
      max-height: 220px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .hint-box {
      font-size: 0.82rem;
      color: var(--text-soft);
      padding: 0.9rem 1rem;
      border-radius: var(--radius-sm);
      background: rgba(184, 134, 201, 0.08);
      border: 1px solid rgba(184, 134, 201, 0.2);
      margin-bottom: 1.25rem;
    }

    .hint-box strong {
      color: var(--text);
      font-weight: 600;
    }

    .start-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-deep);
      background: rgba(184, 134, 201, 0.12);
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: var(--text);
      color: #fff;
      padding: 0.65rem 1.25rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 12px 40px rgba(42, 36, 56, 0.35);
      z-index: 1000;
      opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
      pointer-events: none;
    }

    .toast.is-visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 380px) {
      .answer-btn {
        padding: 0.85rem 0.95rem;
        font-size: 0.88rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <div class="screens" id="screens">
        <!-- Старт -->
        <section class="screen is-active" id="screen-start" aria-labelledby="quiz-title">
          <span class="start-badge">Нейрообраз</span>
          <h1 id="quiz-title">Какой тебе подходит нейрообраз?</h1>
          <p class="subtitle">Пройди короткий визуальный квиз — и получи персональную подсказку с готовым промптом для Nano Banana.</p>
          <button type="button" class="btn-primary" id="btn-start">Начать</button>
        </section>

        <!-- Вопросы (один контейнер, контент меняется) -->
        <section class="screen" id="screen-quiz" hidden aria-live="polite">
          <div class="progress-wrap">
            <div class="progress-label">
              <span>Вопрос</span>
              <span id="progress-text">1 / 5</span>
            </div>
            <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="5" aria-valuenow="1" id="progress-bar-wrap">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
          </div>
          <div class="quiz-body" id="quiz-body">
            <h2 class="question-title" id="question-text"></h2>
            <div class="answers" id="answers"></div>
          </div>
        </section>

        <!-- Результат -->
        <section class="screen" id="screen-result" hidden>
          <p class="start-badge" style="margin-bottom: 0.65rem;">Твой образ</p>
          <h2 class="result-name" id="result-name"></h2>
          <p class="result-desc" id="result-desc"></p>
          <p style="font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent-deep); margin-bottom: 0.45rem;">Промпт для Nano Banana</p>
          <div class="prompt-box" id="result-prompt"></div>
          <div class="hint-box" id="result-hint"></div>
          <button type="button" class="btn-primary" id="btn-copy">Скопировать промпт</button>
          <button type="button" class="btn-secondary" id="btn-retry">Пройти ещё раз</button>
        </section>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status">Промпт скопирован</div>

  <script>
    (function () {
      "use strict";

      var RESULTS = [
        {
          id: "cinematic",
          name: "Кинематографичный образ",
          description: "Тебе подходит глубокая эстетика, атмосферный свет, кадры как из фильма и ощущение истории за каждым взглядом.",
          prompt: "Создай кинематографичный женский портрет на основе моей фотографии из референса. Сохрани узнаваемость лица. Образ должен быть атмосферным, глубоким и визуально дорогим, как кадр из авторского фильма. Мягкий драматичный свет, выразительные тени, благородная цветокоррекция, ощущение истории в кадре. Стиль элегантный, женственный, уверенный. Акцент на глаза, настроение, фактуру света и красивую композицию. Итоговый образ должен выглядеть как постер к красивому кино, эстетично, реалистично и художественно."
        },
        {
          id: "gentle",
          name: "Нежный женственный",
          description: "Тебе подходят мягкость, свет, воздушность и тонкая красота.",
          prompt: "Создай нежный женственный портрет на основе моей фотографии из референса. Сохрани узнаваемость лица. Образ должен быть мягким, воздушным, светлым и эстетичным. Нежная цветовая гамма: молочные, пудровые, бежевые, светло-розовые оттенки. Мягкий рассеянный свет, деликатная красота, романтичная атмосфера, ощущение лёгкости и внутреннего света. Стиль утончённый, природно-женственный, изящный. Кадр должен выглядеть дорого, аккуратно и очень красиво."
        },
        {
          id: "expert",
          name: "Экспертный",
          description: "Тебе важно выглядеть уверенно, современно и сильно.",
          prompt: "Создай экспертный стильный портрет на основе моей фотографии из референса. Сохрани узнаваемость лица. Образ должен передавать уверенность, интеллект, вкус и современный личный бренд. Чистая композиция, аккуратный фон, элегантная одежда, благородные оттенки: белый, графит, чёрный, бежевый. Свет мягкий, профессиональный, журнальный. Визуальная подача сильная, статусная, современная и эстетичная. Итоговый кадр должен выглядеть как премиальный экспертный портрет для личного бренда или медиа."
        },
        {
          id: "fairytale",
          name: "Сказочный",
          description: "Тебе близки магия, фантазия, лёгкое волшебство и образы, которые переносят в другой мир.",
          prompt: "Создай сказочный женский образ на основе моей фотографии из референса. Сохрани узнаваемость лица. Образ должен быть волшебным, красивым, нежным и фантазийным. Добавь атмосферу сказки: мягкое сияние, магический свет, воздушные детали, ощущение чуда и другого мира. Цвета нежные и чарующие: сиреневый, жемчужный, голубоватый, серебристый. Стиль изящный, вдохновляющий, как героиня волшебной истории. Итоговое изображение должно быть эстетичным, женственным, мечтательным и завораживающим."
        },
        {
          id: "futuristic",
          name: "Футуристичный",
          description: "Тебе подходит смелая эстетика будущего, технологичность, яркие акценты и нестандартная визуальная подача.",
          prompt: "Создай футуристичный женский портрет на основе моей фотографии из референса. Сохрани узнаваемость лица. Образ должен быть стильным, смелым, технологичным и визуально впечатляющим. Эстетика будущего: неоновые акценты, холодный свет, стекло, металл, цифровая атмосфера, современный fashion-tech стиль. Цветовая гамма: синий, фиолетовый, серебристый, холодный розовый. Кадр должен выглядеть как премиальная fashion-съёмка из будущего — ярко, необычно, модно и эффектно."
        }
      ];

      var QUESTIONS = [
        {
          text: "Какое у тебя сейчас настроение?",
          options: [
            "Хочу глубины и эстетики",
            "Хочу нежности и лёгкости",
            "Хочу уверенности и силы",
            "Хочу волшебства и вдохновения",
            "Хочу вау-эффект и что-то необычное"
          ]
        },
        {
          text: "Какой стиль тебе ближе?",
          options: [
            "Как кадр из фильма",
            "Воздушный и мягкий",
            "Стильный и статусный",
            "Магический и фантазийный",
            "Технологичный и смелый"
          ]
        },
        {
          text: "Для чего тебе нужен этот образ?",
          options: [
            "Для красивой истории о себе",
            "Для женственного и нежного настроения",
            "Для продвижения и личного бренда",
            "Для мечты, творчества и вдохновения",
            "Для яркого впечатления и нового опыта"
          ]
        },
        {
          text: "Какая цветовая гамма тебе ближе?",
          options: [
            "Глубокие тёмные оттенки, золото, винный",
            "Пудровый, молочный, бежевый",
            "Чёрный, белый, графит, благородные акценты",
            "Сиреневый, жемчужный, небесный, светящийся",
            "Неон, синий, фиолетовый, серебро"
          ]
        },
        {
          text: "Какая энергия тебе ближе?",
          options: [
            "Таинственная героиня",
            "Нежная муза",
            "Уверенный эксперт",
            "Волшебная фея",
            "Девушка из будущего"
          ]
        }
      ];

      var REFERENCE_HINT =
        "Скопируй промпт и вставь его в Nano Banana. Чтобы результат получился персональным и был похож на тебя, обязательно приложи свою фотографию в референс. Лучше использовать портрет с хорошим освещением, где хорошо видно лицо.";

      var scores = [0, 0, 0, 0, 0];
      var currentQuestion = 0;
      var currentPromptText = "";

      var elStart = document.getElementById("screen-start");
      var elQuiz = document.getElementById("screen-quiz");
      var elResult = document.getElementById("screen-result");
      var elQuestionText = document.getElementById("question-text");
      var elAnswers = document.getElementById("answers");
      var elProgressFill = document.getElementById("progress-fill");
      var elProgressText = document.getElementById("progress-text");
      var elProgressWrap = document.getElementById("progress-bar-wrap");
      var elQuizBody = document.getElementById("quiz-body");
      var elResultName = document.getElementById("result-name");
      var elResultDesc = document.getElementById("result-desc");
      var elResultPrompt = document.getElementById("result-prompt");
      var elResultHint = document.getElementById("result-hint");
      var elToast = document.getElementById("toast");

      function showScreen(target) {
        [elStart, elQuiz, elResult].forEach(function (el) {
          var active = el === target;
          el.hidden = !active;
          el.classList.toggle("is-active", active);
          el.classList.remove("is-exit");
        });
      }

      function updateProgress() {
        var n = QUESTIONS.length;
        var step = currentQuestion + 1;
        var pct = (step / n) * 100;
        elProgressFill.style.width = pct + "%";
        elProgressText.textContent = step + " / " + n;
        elProgressWrap.setAttribute("aria-valuenow", String(step));
      }

      function fillQuestionContent() {
        var q = QUESTIONS[currentQuestion];
        elQuestionText.textContent = q.text;
        elAnswers.innerHTML = "";
        q.options.forEach(function (label, index) {
          var btn = document.createElement("button");
          btn.type = "button";
          btn.className = "answer-btn";
          btn.textContent = label;
          btn.setAttribute("data-index", String(index));
          btn.addEventListener("click", onAnswer);
          elAnswers.appendChild(btn);
        });
        updateProgress();
      }

      function renderQuestion() {
        fillQuestionContent();
        elQuizBody.classList.remove("is-fading");
      }

      function goToQuiz() {
        scores = [0, 0, 0, 0, 0];
        currentQuestion = 0;
        showScreen(elQuiz);
        renderQuestion();
      }

      function onAnswer(ev) {
        var btn = ev.currentTarget;
        var idx = parseInt(btn.getAttribute("data-index"), 10);
        if (idx >= 0 && idx < 5) {
          scores[idx]++;
        }

        var buttons = elAnswers.querySelectorAll(".answer-btn");
        for (var b = 0; b < buttons.length; b++) {
          buttons[b].disabled = true;
        }

        elQuizBody.classList.add("is-fading");

        window.setTimeout(function () {
          if (currentQuestion < QUESTIONS.length - 1) {
            currentQuestion++;
            fillQuestionContent();
            elQuizBody.classList.remove("is-fading");
          } else {
            showResult();
          }
        }, 400);
      }

      function pickWinner() {
        var max = -1;
        var winner = 0;
        for (var i = 0; i < scores.length; i++) {
          if (scores[i] > max) {
            max = scores[i];
            winner = i;
          }
        }
        return RESULTS[winner];
      }

      function showResult() {
        var r = pickWinner();
        currentPromptText = r.prompt;
        elResultName.textContent = r.name;
        elResultDesc.textContent = r.description;
        elResultPrompt.textContent = r.prompt;
        elResultHint.textContent = REFERENCE_HINT;
        showScreen(elResult);
      }

      function showToast() {
        elToast.classList.add("is-visible");
        window.clearTimeout(showToast._t);
        showToast._t = window.setTimeout(function () {
          elToast.classList.remove("is-visible");
        }, 2200);
      }

      function copyPrompt() {
        var text = currentPromptText;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(showToast).catch(fallbackCopy);
        } else {
          fallbackCopy();
        }
      }

      function fallbackCopy() {
        var ta = document.createElement("textarea");
        ta.value = currentPromptText;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand("copy");
          showToast();
        } catch (e) {
          /* ignore */
        }
        document.body.removeChild(ta);
      }

      document.getElementById("btn-start").addEventListener("click", goToQuiz);
      document.getElementById("btn-copy").addEventListener("click", copyPrompt);
      document.getElementById("btn-retry").addEventListener("click", function () {
        showScreen(elStart);
      });
    })();
  </script>
</body>
</html>
